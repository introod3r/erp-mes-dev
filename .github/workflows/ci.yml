name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  app-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  sql-static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify SQL assets exist
        run: |
          test -f supabase/migrations/001_core_erp_mes_schema.sql
          test -f tests/sql/001_full_production_loop_smoke_test.sql
          find supabase/migrations -name '*.sql' -print | sort
